<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐍 Snake Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --bg:        #0a0f1a;
      --surface:   #111827;
      --border:    #1e2d40;
      --green:     #00ff88;
      --green-dim: #00cc6a;
      --red:       #ff4757;
      --gold:      #ffd700;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --snake-head:#00ff88;
      --snake-body:#00cc6a;
      --food:      #ff4757;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 520px;
    }

    /* Title */
    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 3.5vw, 22px);
      color: var(--green);
      text-shadow: 0 0 20px rgba(0,255,136,0.6), 0 0 40px rgba(0,255,136,0.3);
      letter-spacing: 2px;
      text-align: center;
      line-height: 1.5;
    }

    /* Score bar */
    .scorebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .score-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-value {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      color: var(--gold);
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
    }

    #highScore { color: var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.5); }

    /* Canvas container */
    .canvas-wrap {
      position: relative;
      border: 2px solid var(--green);
      border-radius: 12px;
      box-shadow:
        0 0 20px rgba(0,255,136,0.25),
        0 0 60px rgba(0,255,136,0.1),
        inset 0 0 30px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      background: #070d18;
    }

    /* Overlay (start / game over) */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(7,13,24,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      text-align: center;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 3vw, 18px);
      line-height: 1.6;
    }

    .overlay-title.green { color: var(--green); text-shadow: 0 0 16px rgba(0,255,136,0.7); }
    .overlay-title.red   { color: var(--red);   text-shadow: 0 0 16px rgba(255,71,87,0.7); }

    .overlay-sub {
      font-size: 15px;
      color: var(--muted);
      max-width: 260px;
      line-height: 1.5;
    }

    .final-score {
      font-family: 'Press Start 2P', monospace;
      font-size: 28px;
      color: var(--gold);
      text-shadow: 0 0 16px rgba(255,215,0,0.6);
    }

    /* Buttons */
    .btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      padding: 12px 28px;
      border: 2px solid var(--green);
      background: transparent;
      color: var(--green);
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: rgba(0,255,136,0.12);
      box-shadow: 0 0 18px rgba(0,255,136,0.4);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    /* Controls info */
    .controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      width: 100%;
    }

    .ctrl-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .ctrl-key {
      background: var(--border);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Mobile D-pad */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
    }

    .dpad-row { display: flex; gap: 4px; }

    .dpad-btn {
      width: 52px; height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--green);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .dpad-btn:active { background: rgba(0,255,136,0.15); }

    @media (max-width: 540px) {
      .dpad { display: flex; }
      .controls { display: none; }
    }

    @media (hover: none) {
      .dpad { display: flex; }
      .controls { display: none; }
    }

    /* Speed selector */
    .speed-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .speed-wrap label { font-weight: 600; }

    .speed-wrap select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <h1>🐍 SNAKE<br>GAME</h1>

  <div class="scorebar">
    <div class="score-item">
      <span class="score-label">Score</span>
      <span class="score-value" id="score">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">High Score</span>
      <span class="score-value" id="highScore">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">Level</span>
      <span class="score-value" id="level">1</span>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="overlay" id="overlay">
      <div class="overlay-title green">🐍 SNAKE GAME</div>
      <div class="overlay-sub">Arrow keys ya WASD se snake ko control karo. Food khao aur score badhao!</div>
      <button class="btn" id="startBtn">▶ SHURU KARO</button>
    </div>
  </div>

  <div class="speed-wrap">
    <label>Speed:</label>
    <select id="speedSelect">
      <option value="200">🐢 Slow</option>
      <option value="130" selected>🐍 Normal</option>
      <option value="80">⚡ Fast</option>
      <option value="50">🔥 Insane</option>
    </select>
  </div>

  <div class="dpad">
    <div class="dpad-row">
      <div class="dpad-btn" id="dUp">▲</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" id="dLeft">◀</div>
      <div class="dpad-btn" id="dDown">▼</div>
      <div class="dpad-btn" id="dRight">▶</div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-item"><span class="ctrl-key">↑↓←→</span> Move</div>
    <div class="ctrl-item"><span class="ctrl-key">WASD</span> Move</div>
    <div class="ctrl-item"><span class="ctrl-key">P</span> Pause</div>
    <div class="ctrl-item"><span class="ctrl-key">R</span> Restart</div>
  </div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');
  const overlay    = document.getElementById('overlay');
  const startBtn   = document.getElementById('startBtn');
  const scoreEl    = document.getElementById('score');
  const highScoreEl= document.getElementById('highScore');
  const levelEl    = document.getElementById('level');
  const speedSelect= document.getElementById('speedSelect');

  const GRID = 20;
  const COLS = canvas.width  / GRID;
  const ROWS = canvas.height / GRID;

  let snake, dir, nextDir, food, score, highScore, level, gameLoop, paused, running;

  highScore = parseInt(localStorage.getItem('snakeHS') || '0');
  highScoreEl.textContent = highScore;

  function init() {
    snake = [
      { x: 10, y: 10 },
      { x: 9,  y: 10 },
      { x: 8,  y: 10 },
    ];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    level   = 1;
    paused  = false;
    running = true;
    scoreEl.textContent = 0;
    levelEl.textContent = 1;
    placeFood();
  }

  function placeFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function getSpeed() {
    const base = parseInt(speedSelect.value);
    return Math.max(base - (level - 1) * 10, 40);
  }

  function startGame() {
    overlay.classList.add('hidden');
    init();
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, getSpeed());
  }

  function tick() {
    if (paused || !running) return;
    dir = { ...nextDir };

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return endGame();
    }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return endGame();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      scoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        highScoreEl.textContent = highScore;
        localStorage.setItem('snakeHS', highScore);
      }
      if (score >= level * 100) {
        level++;
        levelEl.textContent = level;
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, getSpeed());
      }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    // Clear
    ctx.fillStyle = '#070d18';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle grid
    ctx.strokeStyle = 'rgba(30,45,64,0.5)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * GRID, 0);
      ctx.lineTo(i * GRID, canvas.height);
      ctx.stroke();
    }
    for (let j = 0; j <= ROWS; j++) {
      ctx.beginPath();
      ctx.moveTo(0, j * GRID);
      ctx.lineTo(canvas.width, j * GRID);
      ctx.stroke();
    }

    // Food — glowing circle
    const fx = food.x * GRID + GRID / 2;
    const fy = food.y * GRID + GRID / 2;
    const r  = GRID / 2 - 2;

    ctx.save();
    const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, r + 6);
    glow.addColorStop(0, 'rgba(255,71,87,0.7)');
    glow.addColorStop(1, 'rgba(255,71,87,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(fx, fy, r + 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ff4757';
    ctx.shadowColor = '#ff4757';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Snake body
    snake.forEach((seg, i) => {
      const px = seg.x * GRID + 1;
      const py = seg.y * GRID + 1;
      const size = GRID - 2;

      ctx.save();
      if (i === 0) {
        // Head — brighter
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur  = 16;
        ctx.fillStyle   = '#00ff88';
      } else {
        const t = i / (snake.length - 1);
        const g = Math.round(255 * (1 - t * 0.45)).toString(16).padStart(2,'0');
        ctx.fillStyle = `#00${g}6a`;
        ctx.shadowColor = '#00cc6a';
        ctx.shadowBlur  = 6;
      }
      ctx.beginPath();
      ctx.roundRect(px, py, size, size, i === 0 ? 5 : 3);
      ctx.fill();

      // Eyes on head
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0a0f1a';
        const ex = seg.x * GRID, ey = seg.y * GRID;
        if (dir.x === 1)  { ctx.fillRect(ex+13, ey+3, 3, 3); ctx.fillRect(ex+13, ey+13, 3, 3); }
        if (dir.x === -1) { ctx.fillRect(ex+3,  ey+3, 3, 3); ctx.fillRect(ex+3,  ey+13, 3, 3); }
        if (dir.y === -1) { ctx.fillRect(ex+3,  ey+3, 3, 3); ctx.fillRect(ex+13, ey+3,  3, 3); }
        if (dir.y === 1)  { ctx.fillRect(ex+3,  ey+13,3, 3); ctx.fillRect(ex+13, ey+13, 3, 3); }
      }
      ctx.restore();
    });

    // Paused banner
    if (paused) {
      ctx.fillStyle = 'rgba(7,13,24,0.75)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff88';
      ctx.font = "bold 16px 'Press Start 2P'";
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      ctx.font = "12px 'Rajdhani'";
      ctx.fillStyle = '#64748b';
      ctx.fillText('P dabao resume karne ke liye', canvas.width / 2, canvas.height / 2 + 30);
    }
  }

  function endGame() {
    running = false;
    clearInterval(gameLoop);

    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <div class="overlay-title red">💀 GAME OVER</div>
      <div class="final-score">${score}</div>
      <div class="overlay-sub">
        ${score >= highScore && score > 0 ? '🏆 Naya High Score! Shabash!' : `High Score: ${highScore}`}
      </div>
      <button class="btn" id="startBtn">🔄 PHIR KHELO</button>
    `;
    document.getElementById('startBtn').addEventListener('click', startGame);
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    switch(e.key) {
      case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = {x:0,y:-1}; e.preventDefault(); break;
      case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = {x:0,y:1};  e.preventDefault(); break;
      case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = {x:-1,y:0}; e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = {x:1,y:0};  e.preventDefault(); break;
      case 'p': case 'P': if (running) { paused = !paused; if (!paused) draw(); } break;
      case 'r': case 'R': if (running || !running) startGame(); break;
    }
  });

  // D-pad buttons
  document.getElementById('dUp')   .addEventListener('click', () => { if (dir.y !==  1) nextDir = {x:0,y:-1}; });
  document.getElementById('dDown') .addEventListener('click', () => { if (dir.y !== -1) nextDir = {x:0,y:1};  });
  document.getElementById('dLeft') .addEventListener('click', () => { if (dir.x !==  1) nextDir = {x:-1,y:0}; });
  document.getElementById('dRight').addEventListener('click', () => { if (dir.x !== -1) nextDir = {x:1,y:0};  });

  // Start button (initial)
  startBtn.addEventListener('click', startGame);

  // Draw empty board on load
  ctx.fillStyle = '#070d18';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
  </html>
